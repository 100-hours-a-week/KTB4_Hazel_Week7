<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>

  <link rel="stylesheet" href="../../index.css" />
  <link rel="stylesheet" href="../../components/header/header.css" />
  <link rel="stylesheet" href="../../components/input/input.css" />
  <link rel="stylesheet" href="./signup.css" />
</head>
<body>
  <div id="header"></div>

  <main class="auth">
    <form id="signupForm" class="auth-form" novalidate>
      <h1 class="auth-form__title">회원가입</h1>
      <p class="auth-form__subtitle">계정을 만들고 다짐을 시작해보세요</p>

      <div class="profile-image-field">
        <p class="profile-image-field__label">프로필 사진</p>
        <p id="profileImageHelper" class="profile-image-field__helper"></p>

        <label class="profile-image-field__button" for="profileImage">
          <span class="profile-image-field__plus">+</span>
        </label>

        <input
          id="profileImage"
          name="profileImage"
          class="profile-image-field__input"
          type="file"
          accept="image/*"
        />
      </div>

      <div id="signupFields" class="auth-form__fields"></div>

      <button class="auth-form__submit" type="submit">회원가입</button>
      <button id="gotoSignup" class="auth-form__switch" type="button">
        이미 계정이 있으신가요? <span>로그인하기</span>
      </button>
    </form>
  </main>

  <script type="module" src="./signup.js"></script>
</body>
</html>
